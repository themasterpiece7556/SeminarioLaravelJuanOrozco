version: '3.8'

services:
  # Servicio de la aplicación PHP
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seminario_php
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    networks:
      - seminario_network
    depends_on:
      - db

  # Servicio de base de datos (MariaDB/MySQL)
  db:
    image: mariadb:10.8
    container_name: seminario_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: seminario_db
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - seminario_network

  # Servicio de phpMyAdmin (interfaz gráfica para la BD)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: seminario_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_password
      UPLOAD_LIMIT: 100M
    ports:
      - "8081:80"
    networks:
      - seminario_network
    depends_on:
      - db

# Volúmenes persistentes (los datos de la BD viven aunque se borren los contenedores)
volumes:
  db_data:

# Red interna personalizada para que los contenedores se "vean" por nombre
networks:
  seminario_network:
    driver: bridge
